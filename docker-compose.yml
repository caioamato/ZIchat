services:
  backend:
    build: ./backend
    container_name: zitask-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - zitask-network

  frontend:
    build: ./frontend
    container_name: zitask-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=https://api.zitask.cloud
    networks:
      - zitask-network

  db:
    image: postgres:15-alpine
    container_name: zitask-db
    environment:
      POSTGRES_USER: ${DB_USER:-zitask_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zitask_pass}
      POSTGRES_DB: ${DB_NAME:-zitask_db}
    volumes:
      - zitask-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zitask_user} -d ${DB_NAME:-zitask_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - zitask-network

  redis:
    image: redis:7-alpine
    container_name: zitask-redis
    networks:
      - zitask-network

networks:
  zitask-network:
    driver: bridge

volumes:
  zitask-db-data:
