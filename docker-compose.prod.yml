services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: zitask-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - zitask-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: zitask-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - zitask-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: zitask-db
    environment:
      POSTGRES_USER: ${DB_USER:-zitask_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zitask_pass}
      POSTGRES_DB: ${DB_NAME:-zitask_db}
    volumes:
      - zitask-db-data:/var/lib/postgresql/data
    networks:
      - zitask-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zitask_user} -d ${DB_NAME:-zitask_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: zitask-redis
    networks:
      - zitask-network
    restart: unless-stopped

networks:
  zitask-network:
    driver: bridge

volumes:
  zitask-db-data:
