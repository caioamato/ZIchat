services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: zitask-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - zitask-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: zitask-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - zitask-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  db:
    image: postgres:15-alpine
    container_name: zitask-db
    environment:
      POSTGRES_USER: ${DB_USER:-zitask_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zitask_pass}
      POSTGRES_DB: ${DB_NAME:-zitask_db}
    volumes:
      - zitask-db-data:/var/lib/postgresql/data
    networks:
      - zitask-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zitask_user} -d ${DB_NAME:-zitask_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: zitask-redis
    networks:
      - zitask-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

networks:
  zitask-network:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.200.0/24

volumes:
  zitask-db-data:
